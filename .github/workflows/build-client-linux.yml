name: Build client (Linux)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, SHA)"
        required: false
        default: ""

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

# Pinned versions — keep in sync with upstream/.github/workflows/flutter-build.yml
# at the tag recorded in client/upstream/.upstream-ref.
env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: false

      # --------------------------------------------------------------------
      # Gate: every required secret/variable must be present before spending
      # CI minutes on apt + vcpkg.
      # --------------------------------------------------------------------
      - name: Verify build env contract
        env:
          RENDEZVOUS_SERVER:     ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY:            ${{ secrets.RS_PUB_KEY }}
          API_SERVER:            ${{ secrets.API_SERVER }}
          BRAND_APP_NAME:        ${{ vars.BRAND_APP_NAME }}
          BRAND_ORG:             ${{ vars.BRAND_ORG }}
          BRAND_ANDROID_APP_ID:  ${{ vars.BRAND_ANDROID_APP_ID }}
          BRAND_MACOS_BUNDLE_ID: ${{ vars.BRAND_MACOS_BUNDLE_ID }}
          BRAND_COPYRIGHT:       ${{ vars.BRAND_COPYRIGHT }}
        run: |
          missing=()
          for v in RENDEZVOUS_SERVER RS_PUB_KEY API_SERVER \
                   BRAND_APP_NAME BRAND_ORG BRAND_ANDROID_APP_ID \
                   BRAND_MACOS_BUNDLE_ID BRAND_COPYRIGHT; do
              [[ -n "${!v}" ]] || missing+=("$v")
          done
          if (( ${#missing[@]} )); then
              echo "::error::missing secrets/variables: ${missing[*]}"
              echo "See docs/02-client-build.md for setup."
              exit 1
          fi
          echo "all 8 required values are set"

      # --------------------------------------------------------------------
      # System build deps (mirrors upstream matrix, minus GPU/ARM bits).
      # --------------------------------------------------------------------
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              clang cmake curl pkg-config git python3 \
              libasound2-dev libpulse-dev \
              libxdo-dev libxfixes-dev libxrandr-dev libxext-dev \
              libxinerama-dev libxcb1-dev libxcb-shape0-dev \
              libxcb-xfixes0-dev libxcb-randr0-dev libxcb-shm0-dev \
              libxkbcommon-dev libx11-dev \
              libgtk-3-dev libpango1.0-dev libglib2.0-dev \
              libpam0g-dev libudev-dev libdrm-dev libva-dev \
              libvdpau-dev libayatana-appindicator3-dev \
              ninja-build \
              binutils

      # --------------------------------------------------------------------
      # Rust toolchain (pinned).
      # --------------------------------------------------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/upstream
          shared-key: linux-x64

      # --------------------------------------------------------------------
      # vcpkg: libvpx, libyuv, opus, aom  — heavy, so aggressively cached
      # by its commit id.
      # --------------------------------------------------------------------
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_TRIPLET: x64-linux
        run: |
          "$VCPKG_ROOT/vcpkg" install libvpx libyuv opus aom
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"

      # --------------------------------------------------------------------
      # Flutter (pinned).
      # --------------------------------------------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-linux-${{ env.FLUTTER_VERSION }}

      # --------------------------------------------------------------------
      # Apply branding + hardcode injection.
      # --------------------------------------------------------------------
      - name: Apply branding
        env:
          RENDEZVOUS_SERVER:     ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY:            ${{ secrets.RS_PUB_KEY }}
          API_SERVER:            ${{ secrets.API_SERVER }}
          BRAND_APP_NAME:        ${{ vars.BRAND_APP_NAME }}
          BRAND_ORG:             ${{ vars.BRAND_ORG }}
          BRAND_ANDROID_APP_ID:  ${{ vars.BRAND_ANDROID_APP_ID }}
          BRAND_MACOS_BUNDLE_ID: ${{ vars.BRAND_MACOS_BUNDLE_ID }}
          BRAND_COPYRIGHT:       ${{ vars.BRAND_COPYRIGHT }}
        run: client/scripts/apply-branding.sh

      # --------------------------------------------------------------------
      # Build Rust core (as shared library consumed by Flutter).
      # --------------------------------------------------------------------
      - name: Build Rust core
        working-directory: client/upstream
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: cargo build --lib --features flutter --release

      # --------------------------------------------------------------------
      # Build Flutter Linux.
      # --------------------------------------------------------------------
      - name: Build Flutter Linux
        working-directory: client/upstream
        run: |
          mkdir -p flutter/build/release
          # Upstream expects librustdesk.so at the Flutter native assets
          # location; build.py does this copy automatically.
          python3 build.py --flutter --skip-cargo

      # --------------------------------------------------------------------
      # Verify hardcoded values land in the binary.
      # --------------------------------------------------------------------
      - name: Verify hardcoded values
        env:
          EXPECT_RENDEZVOUS: ${{ secrets.RENDEZVOUS_SERVER }}
          EXPECT_RELAY:      ${{ secrets.RENDEZVOUS_SERVER }}:21117
          EXPECT_API:        ${{ secrets.API_SERVER }}
          EXPECT_RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          # Locate the Flutter-built binary. Upstream produces
          # flutter/build/linux/x64/release/bundle/<product>
          bundle_dir=$(ls -d client/upstream/flutter/build/linux/x64/release/bundle 2>/dev/null || true)
          if [[ -z "$bundle_dir" ]]; then
              echo "::error::flutter build did not produce a bundle"
              find client/upstream -maxdepth 6 -name '*.so' -o -name 'flutter_hbb' | head -20
              exit 1
          fi
          echo "bundle: $bundle_dir"
          ls -la "$bundle_dir"
          # Scan every ELF in the bundle (main exe + .so shims).
          mapfile -t targets < <(find "$bundle_dir" -maxdepth 3 -type f \
              \( -name '*.so' -o -executable \) 2>/dev/null)
          client/scripts/verify-hardcoded.sh "${targets[@]}"

      # --------------------------------------------------------------------
      # Tarball the Flutter bundle and upload.
      # --------------------------------------------------------------------
      - name: Package artefact
        env:
          BRAND_APP_NAME: ${{ vars.BRAND_APP_NAME }}
        run: |
          cd client/upstream/flutter/build/linux/x64/release
          tarball="${BRAND_APP_NAME}-linux-x64-${GITHUB_SHA::7}.tar.gz"
          tar -czf "$GITHUB_WORKSPACE/$tarball" bundle
          echo "ARTIFACT_PATH=$tarball" >> "$GITHUB_ENV"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 14
          if-no-files-found: error
