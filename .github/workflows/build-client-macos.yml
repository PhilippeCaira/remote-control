name: Build client (macOS)

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build"
        type: string
        required: false
        default: ""
      release_tag:
        description: "Release tag attached to the artefact name"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, SHA)"
        required: false
        default: ""
      release_tag:
        description: "Tag to use in the artefact filename"
        required: false
        default: ""

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  # macOS requires a newer Rust than Linux/Windows because upstream's
  # cidre dependency requires 1.81+. See MAC_RUST_VERSION comment in
  # client/upstream/.github/workflows/flutter-build.yml.
  RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  NASM_VERSION: "2.16.03"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: macOS ${{ matrix.job.arch }}
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        job:
          - { arch: x86_64,  os: macos-15-intel, target: x86_64-apple-darwin,  vcpkg-triplet: x64-osx }
          - { arch: aarch64, os: macos-14,       target: aarch64-apple-darwin, vcpkg-triplet: arm64-osx }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: false

      # --------------------------------------------------------------------
      - name: Verify build env contract
        shell: bash
        env:
          RENDEZVOUS_SERVER:     ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY:            ${{ secrets.RS_PUB_KEY }}
          API_SERVER:            ${{ secrets.API_SERVER }}
          BRAND_APP_NAME:        ${{ vars.BRAND_APP_NAME }}
          BRAND_ORG:             ${{ vars.BRAND_ORG }}
          BRAND_ANDROID_APP_ID:  ${{ vars.BRAND_ANDROID_APP_ID }}
          BRAND_MACOS_BUNDLE_ID: ${{ vars.BRAND_MACOS_BUNDLE_ID }}
          BRAND_COPYRIGHT:       ${{ vars.BRAND_COPYRIGHT }}
        run: |
          missing=()
          for v in RENDEZVOUS_SERVER RS_PUB_KEY API_SERVER \
                   BRAND_APP_NAME BRAND_ORG BRAND_ANDROID_APP_ID \
                   BRAND_MACOS_BUNDLE_ID BRAND_COPYRIGHT; do
              [[ -n "${!v}" ]] || missing+=("$v")
          done
          if (( ${#missing[@]} )); then
              echo "::error::missing secrets/variables: ${missing[*]}"
              echo "See docs/02-client-build.md for setup."
              exit 1
          fi
          echo "all 8 required values are set"

      # --------------------------------------------------------------------
      # System deps.
      # NASM 2.16 (NOT 3.x via brew — incompatible CLI, breaks aom).
      # --------------------------------------------------------------------
      - name: Install build runtime (brew)
        run: |
          brew install llvm create-dmg
          command -v pkg-config >/dev/null || brew install pkg-config

      - name: Install NASM 2.16
        run: |
          curl -fsSLO "https://www.nasm.us/pub/nasm/releasebuilds/${NASM_VERSION}/macosx/nasm-${NASM_VERSION}-macosx.zip"
          unzip -q "nasm-${NASM_VERSION}-macosx.zip"
          sudo cp "nasm-${NASM_VERSION}/nasm" /usr/local/bin/nasm
          nasm --version

      # --------------------------------------------------------------------
      # Rust + Flutter + vcpkg.
      # --------------------------------------------------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/upstream
          shared-key: ${{ matrix.job.os }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ matrix.job.os }}-${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter SDK
        shell: bash
        run: |
          flutter_root="$(dirname "$(dirname "$(command -v flutter)")")"
          patch_file="client/upstream/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if [[ -f "$patch_file" && "${FLUTTER_VERSION}" == "3.24.5" ]]; then
            cp "$patch_file" "$flutter_root/"
            pushd "$flutter_root" >/dev/null
            git apply "$(basename "$patch_file")" || echo "::warning::flutter SDK patch already applied or does not apply"
            popd >/dev/null
          fi
          # Upstream workaround for flutter/flutter#133533 (pointer events
          # freeze on macOS when window loses focus).
          bind="$(dirname "$(command -v flutter)")/../packages/flutter/lib/src/scheduler/binding.dart"
          if [[ -f "$bind" ]]; then
              sed -i '' -e 's|_setFramesEnabledState(false);|//_setFramesEnabledState(false);|g' "$bind"
          fi

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.job.vcpkg-triplet }}
        run: |
          "$VCPKG_ROOT/vcpkg" install libvpx libyuv opus aom ffmpeg
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"

      - name: Download bridge artefact
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: client/upstream/

      - name: Assert bridge files present
        shell: bash
        run: |
          for f in src/bridge_generated.rs src/bridge_generated.io.rs \
                   flutter/lib/generated_bridge.dart \
                   flutter/lib/generated_bridge.freezed.dart; do
              [[ -f "client/upstream/$f" ]] || { echo "::error::$f missing — bridge job did not run?"; exit 1; }
          done

      # --------------------------------------------------------------------
      - name: Apply branding
        shell: bash
        env:
          RENDEZVOUS_SERVER:     ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY:            ${{ secrets.RS_PUB_KEY }}
          API_SERVER:            ${{ secrets.API_SERVER }}
          BRAND_APP_NAME:        ${{ vars.BRAND_APP_NAME }}
          BRAND_ORG:             ${{ vars.BRAND_ORG }}
          BRAND_ANDROID_APP_ID:  ${{ vars.BRAND_ANDROID_APP_ID }}
          BRAND_MACOS_BUNDLE_ID: ${{ vars.BRAND_MACOS_BUNDLE_ID }}
          BRAND_COPYRIGHT:       ${{ vars.BRAND_COPYRIGHT }}
        run: client/scripts/apply-branding.sh

      # --------------------------------------------------------------------
      # Build. We bypass upstream build.py on macOS because it hardcodes
      # the RustDesk.app path in multiple places — our PRODUCT_NAME is
      # renamed via apply-branding, so flutter produces e.g.
      # RemoteControl.app, and build.py's cp of the service binary hits
      # a non-existent path. Drive cargo + flutter directly instead.
      # --hwcodec skipped (custom Flutter engine required);
      # --screencapturekit kept on arm64 per upstream's matrix.
      # --------------------------------------------------------------------
      - name: Build Rust library
        working-directory: client/upstream
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          CXXFLAGS: "-include cstdint"
          CARGO_NET_RETRY: "10"
        run: |
          FEATURES="flutter,unix-file-copy-paste"
          [[ "${{ matrix.job.arch }}" == "aarch64" ]] && FEATURES="$FEATURES,screencapturekit"
          cargo build --lib --features "$FEATURES" --release

      - name: Build Flutter macOS
        working-directory: client/upstream/flutter
        env:
          CXXFLAGS: "-include cstdint"
        run: |
          flutter pub get
          flutter build macos --release

      # --------------------------------------------------------------------
      # Verify hardcoded values inside the .app bundle.
      # --------------------------------------------------------------------
      - name: Verify hardcoded values
        shell: bash
        env:
          EXPECT_RENDEZVOUS: ${{ secrets.RENDEZVOUS_SERVER }}
          EXPECT_RELAY:      ${{ secrets.RENDEZVOUS_SERVER }}:21117
          EXPECT_API:        ${{ secrets.API_SERVER }}
          EXPECT_RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          # GNU binutils' `strings` is not installed by default; the
          # `strings` from llvm (installed via brew) works and is on PATH
          # at $(brew --prefix llvm)/bin — but the xcode bundled `strings`
          # is already in /usr/bin and handles Mach-O correctly.
          app_dir=$(ls -d client/upstream/flutter/build/macos/Build/Products/Release/*.app 2>/dev/null | head -1)
          if [[ -z "$app_dir" ]]; then
              echo "::error::no .app bundle produced"
              find client/upstream/flutter/build/macos -maxdepth 6 -name '*.app' -o -name '*.dylib' | head
              exit 1
          fi
          echo "app bundle: $app_dir"
          # Scan only the Rust-compiled dylib — the main Flutter exe is
          # stripped and does not carry the hardcoded strings.
          # NOTE: macOS ships bash 3.2 which lacks `mapfile`; portable loop:
          targets=()
          while IFS= read -r f; do targets+=("$f"); done < <(find "$app_dir" -type f \
              \( -name 'librustdesk*.dylib' -o -name 'librustdesk.so' \) 2>/dev/null)
          if (( ${#targets[@]} == 0 )); then
              echo "::error::no librustdesk dylib found in $app_dir"
              find "$app_dir" -maxdepth 6 -type f -name '*.dylib' | head
              exit 1
          fi
          client/scripts/verify-hardcoded.sh "${targets[@]}"
          echo "APP_DIR=$app_dir" >> "$GITHUB_ENV"

      # --------------------------------------------------------------------
      # Code sign (conditional) — uses rcodesign so we are independent
      # of an Apple Silicon runner with a keychain. Gated on the
      # APPLE_DEVELOPER_ID_CERT_BASE64 secret.
      #
      # Expected secrets (all required together):
      #   APPLE_DEVELOPER_ID_CERT_BASE64     - base64 of the .p12 cert
      #   APPLE_DEVELOPER_ID_CERT_PASSWORD
      #   APPLE_TEAM_ID                      - from https://developer.apple.com/account
      #   APPLE_APPLE_ID                     - email used on the Apple Dev account
      #   APPLE_APP_SPECIFIC_PASSWORD        - app-specific password for notarytool
      # --------------------------------------------------------------------
      - name: Setup signing credentials
        id: signing
        shell: bash
        env:
          CERT_BASE64:  ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          CERT_PWD:     ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID:     ${{ secrets.APPLE_APPLE_ID }}
          APP_PWD:      ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "$CERT_BASE64" ]]; then
              echo "APPLE_DEVELOPER_ID_CERT_BASE64 not set — skipping codesign + notarize"
              echo "enabled=0" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          for v in CERT_PWD TEAM_ID APPLE_ID APP_PWD; do
              if [[ -z "${!v:-}" ]]; then
                  echo "::error::required secret missing: $v"
                  exit 1
              fi
          done
          cert_path="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$CERT_BASE64" | base64 --decode > "$cert_path"
          echo "cert_path=$cert_path" >> "$GITHUB_OUTPUT"
          echo "enabled=1" >> "$GITHUB_OUTPUT"

      - name: Install rcodesign
        if: steps.signing.outputs.enabled == '1'
        run: cargo install apple-codesign --locked --version 0.29.0

      - name: Codesign .app bundle
        if: steps.signing.outputs.enabled == '1'
        env:
          CERT_PATH:     ${{ steps.signing.outputs.cert_path }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          TEAM_ID:       ${{ secrets.APPLE_TEAM_ID }}
        run: |
          rcodesign sign \
              --p12-file "$CERT_PATH" \
              --p12-password "$CERT_PASSWORD" \
              --code-signature-flags runtime \
              --team-name "$TEAM_ID" \
              "$APP_DIR"

      # --------------------------------------------------------------------
      # Package .dmg. Done after codesign so the dmg contains the signed
      # bundle.
      # --------------------------------------------------------------------
      - name: Package .dmg
        env:
          BRAND_APP_NAME: ${{ vars.BRAND_APP_NAME }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          tag="${RELEASE_TAG:-${GITHUB_SHA:0:7}}"
          OUT="${BRAND_APP_NAME}-macos-${{ matrix.job.arch }}-${tag}.dmg"
          # Workaround: create-dmg occasionally hits an unmount race.
          CREATE_DMG="$(readlink -f "$(command -v create-dmg)")"
          sed -i '' -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG" || true
          create-dmg \
              --icon "$(basename "$APP_DIR")" 200 190 \
              --hide-extension "$(basename "$APP_DIR")" \
              --window-size 800 400 \
              --app-drop-link 600 185 \
              "$OUT" \
              "$APP_DIR"
          echo "ARTIFACT_PATH=$OUT" >> "$GITHUB_ENV"

      - name: Codesign .dmg
        if: steps.signing.outputs.enabled == '1'
        env:
          CERT_PATH:     ${{ steps.signing.outputs.cert_path }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          rcodesign sign \
              --p12-file "$CERT_PATH" \
              --p12-password "$CERT_PASSWORD" \
              "$ARTIFACT_PATH"

      - name: Notarize .dmg
        if: steps.signing.outputs.enabled == '1'
        env:
          TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID:     ${{ secrets.APPLE_APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          creds="$RUNNER_TEMP/notary-creds.json"
          umask 077
          printf '{"team_id":"%s","apple_id":"%s","password":"%s"}\n' \
              "$TEAM_ID" "$APPLE_ID" "$APP_PASSWORD" > "$creds"
          rcodesign notary-submit \
              --api-key-path "$creds" \
              --staple \
              "$ARTIFACT_PATH"
          rm -f "$creds"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.job.arch }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 14
          if-no-files-found: error
