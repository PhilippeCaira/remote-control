name: Generate bridge

# Runs flutter_rust_bridge_codegen to produce:
#   client/upstream/src/bridge_generated.rs
#   client/upstream/src/bridge_generated.io.rs
#   client/upstream/flutter/lib/generated_bridge.dart
#   client/upstream/flutter/lib/generated_bridge.freezed.dart
#   client/upstream/flutter/macos/Runner/bridge_generated.h
#
# Every per-platform build workflow downloads the `bridge-artifact` produced
# here BEFORE compiling, because:
#   - cargo build --features flutter chokes on the missing mod
#     `bridge_generated` otherwise;
#   - flutter build linux/windows/macos/apk chokes on the matching Dart side.
#
# Two quirks make this non-trivial:
#   1. Upstream RustDesk uses a FORK of flutter_rust_bridge at
#      https://github.com/SoLongAndThanksForAllThePizza/flutter_rust_bridge
#      instead of the crates.io release. The fork fixes enum-tuple-with-bool
#      codegen bugs that the stock codegen still has. Clone + cargo install.
#   2. The codegen requires Flutter 3.22.3 (older); the runtime build uses
#      Flutter 3.24.5. Installing two Flutters side by side and pointing
#      only this workflow at 3.22.3 is the simplest split.

on:
  workflow_call:
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  CODEGEN_FLUTTER_VERSION: "3.22.3"      # NOT 3.24.5 — used only here
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"  # matches the crate version pinned in Cargo.toml
  CARGO_EXPAND_VERSION: "1.0.95"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  bridge:
    name: flutter_rust_bridge codegen
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              clang cmake curl git pkg-config \
              libclang-dev llvm-dev \
              libgtk-3-dev libssl-dev \
              ninja-build nasm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bridge

      - name: Install cargo-expand
        run: cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked

      - name: Install flutter_rust_bridge_codegen 1.80.1 (crates.io)
        # Must match the runtime `flutter_rust_bridge = "=1.80"` pinned in
        # client/upstream/Cargo.toml. The SoLongAndThanksForAllThePizza fork
        # is at 1.75.0 (5 versions behind) and emits the old `IntoDart`
        # trait, while 1.80 expects `IntoIntoDart`. Version mismatch makes
        # cargo build fail. --features uuid enables UUID<->String bridging
        # (same flag upstream CI bridge.yml uses).
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Setup Flutter 3.22.3 (codegen only)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.CODEGEN_FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-codegen-${{ env.CODEGEN_FLUTTER_VERSION }}

      - name: Activate ffigen (6.0.1+, <8)
        run: dart pub global activate ffigen '>=6.0.1 <8.0.0'

      - name: Pin deps for codegen (upstream workflow parity)
        working-directory: client/upstream/flutter
        # Upstream's bridge.yml sed-downgrades extended_text to 13.0.0 for
        # the codegen step only (it is reverted to 14.0.0 by the build
        # workflows). ffigen stays at ^8.0.x (what the pubspec ships) —
        # flutter_rust_bridge_codegen 1.80.1 from crates.io REQUIRES ffigen
        # in [8.0.0, 9.0.0). Do NOT downgrade it.
        run: |
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          grep -E "extended_text:|ffigen:" pubspec.yaml
          flutter pub get

      - name: Run flutter_rust_bridge_codegen
        working-directory: client/upstream
        run: |
          flutter_rust_bridge_codegen \
              --rust-input ./src/flutter_ffi.rs \
              --dart-output ./flutter/lib/generated_bridge.dart \
              --c-output ./flutter/macos/Runner/bridge_generated.h

          # Mirror .h into iOS Runner (upstream does the same).
          mkdir -p ./flutter/ios/Runner
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Verify freezed output sanity
        working-directory: client/upstream
        # The fork codegen sometimes mis-emits EventToUI::Texture(usize, bool)
        # in dart freezed as NativeFunction<Int Function(Pointer<Int>)>
        # (verified reproducible on Fedora 43 / Dart 3.5+). Fail fast if that
        # slips through so CI doesn't push broken bridge files to consumers.
        run: |
          if grep -q 'NativeFunction<Int Function(Pointer<Int>)>' \
                 flutter/lib/generated_bridge.freezed.dart; then
              echo "::error::Freezed output has the NativeFunction bug — codegen fork regression?"
              grep -B1 -A3 'Texture(' flutter/lib/generated_bridge.freezed.dart | head -20
              exit 1
          fi
          echo "freezed output OK"

      - name: Upload bridge artefact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            client/upstream/src/bridge_generated.rs
            client/upstream/src/bridge_generated.io.rs
            client/upstream/flutter/lib/generated_bridge.dart
            client/upstream/flutter/lib/generated_bridge.freezed.dart
            client/upstream/flutter/macos/Runner/bridge_generated.h
            client/upstream/flutter/ios/Runner/bridge_generated.h
          retention-days: 1
          if-no-files-found: error
