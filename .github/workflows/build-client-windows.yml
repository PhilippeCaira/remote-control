name: Build client (Windows)

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build"
        type: string
        required: false
        default: ""
      release_tag:
        description: "Release tag attached to the artefact name"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, SHA)"
        required: false
        default: ""
      release_tag:
        description: "Tag to use in the artefact filename"
        required: false
        default: ""

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_TRIPLET: "x64-windows-static"
  SIGNTOOL_TIMESTAMP_URL: "http://timestamp.digicert.com"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: false

      # --------------------------------------------------------------------
      # Gate on the full env contract before provisioning any toolchain —
      # saves ~30 minutes of vcpkg time when a secret is misspelled.
      # --------------------------------------------------------------------
      - name: Verify build env contract
        shell: bash
        env:
          RENDEZVOUS_SERVER:     ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY:            ${{ secrets.RS_PUB_KEY }}
          API_SERVER:            ${{ secrets.API_SERVER }}
          BRAND_APP_NAME:        ${{ vars.BRAND_APP_NAME }}
          BRAND_ORG:             ${{ vars.BRAND_ORG }}
          BRAND_ANDROID_APP_ID:  ${{ vars.BRAND_ANDROID_APP_ID }}
          BRAND_MACOS_BUNDLE_ID: ${{ vars.BRAND_MACOS_BUNDLE_ID }}
          BRAND_COPYRIGHT:       ${{ vars.BRAND_COPYRIGHT }}
        run: |
          missing=()
          for v in RENDEZVOUS_SERVER RS_PUB_KEY API_SERVER \
                   BRAND_APP_NAME BRAND_ORG BRAND_ANDROID_APP_ID \
                   BRAND_MACOS_BUNDLE_ID BRAND_COPYRIGHT; do
              [[ -n "${!v}" ]] || missing+=("$v")
          done
          if (( ${#missing[@]} )); then
              echo "::error::missing secrets/variables: ${missing[*]}"
              echo "See docs/02-client-build.md for setup."
              exit 1
          fi
          echo "all 8 required values are set"

      # --------------------------------------------------------------------
      # Toolchain.
      # --------------------------------------------------------------------
      - name: Install LLVM/Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/upstream
          shared-key: windows-x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-windows-${{ env.FLUTTER_VERSION }}

      # Upstream applies a small Flutter SDK patch at build time (dropdown
      # menu enableFilter). Reuse the patch shipped inside the subtree.
      - name: Patch Flutter SDK
        shell: bash
        run: |
          flutter_root="$(dirname "$(dirname "$(command -v flutter)")")"
          patch_file="client/upstream/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if [[ -f "$patch_file" && "${FLUTTER_VERSION}" == "3.24.5" ]]; then
            cp "$patch_file" "$flutter_root/"
            pushd "$flutter_root" >/dev/null
            git apply "$(basename "$patch_file")" || echo "::warning::flutter SDK patch already applied or does not apply"
            popd >/dev/null
          fi

      # --------------------------------------------------------------------
      # vcpkg — libvpx / libyuv / opus / aom for x64-windows-static.
      # --------------------------------------------------------------------
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          "$VCPKG_ROOT/vcpkg.exe" install --triplet ${{ env.VCPKG_TRIPLET }} libvpx libyuv opus aom ffmpeg
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"

      - name: Download bridge artefact
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: client/upstream/

      - name: Assert bridge files present
        shell: bash
        run: |
          for f in src/bridge_generated.rs src/bridge_generated.io.rs \
                   flutter/lib/generated_bridge.dart \
                   flutter/lib/generated_bridge.freezed.dart; do
              [[ -f "client/upstream/$f" ]] || { echo "::error::$f missing — bridge job did not run?"; exit 1; }
          done

      # --------------------------------------------------------------------
      # Apply branding. Git Bash on Windows handles sed/install/grep fine.
      # --------------------------------------------------------------------
      - name: Apply branding
        shell: bash
        env:
          RENDEZVOUS_SERVER:     ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY:            ${{ secrets.RS_PUB_KEY }}
          API_SERVER:            ${{ secrets.API_SERVER }}
          BRAND_APP_NAME:        ${{ vars.BRAND_APP_NAME }}
          BRAND_ORG:             ${{ vars.BRAND_ORG }}
          BRAND_ANDROID_APP_ID:  ${{ vars.BRAND_ANDROID_APP_ID }}
          BRAND_MACOS_BUNDLE_ID: ${{ vars.BRAND_MACOS_BUNDLE_ID }}
          BRAND_COPYRIGHT:       ${{ vars.BRAND_COPYRIGHT }}
        run: client/scripts/apply-branding.sh

      # --------------------------------------------------------------------
      # Build.
      # build.py --flutter --skip-portable-pack drives cargo + flutter and
      # skips the rustdesk-portable-packer stage (we produce a plain zip).
      # --hwcodec and --vram are intentionally NOT passed: they require the
      # custom Flutter engine binary from rustdesk/engine — out of scope
      # for v0 (can be added later without changing our scripts).
      # --------------------------------------------------------------------
      - name: Build
        working-directory: client/upstream
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          # NOTE: CXXFLAGS="-include cstdint" (GCC syntax for defensive
          # header injection) is intentionally NOT set here. MSVC uses
          # /FI instead, and MSVC doesn't have the GCC-13+ libwebm issue
          # the Linux/macOS workflows guard against.
          CARGO_NET_RETRY: "10"
        run: |
          python3 build.py --flutter --skip-portable-pack
          if (-not $?) { throw "build.py failed" }

      # --------------------------------------------------------------------
      # Code signing (conditional) — signs the main .exe and DLLs.
      # Activated when WINDOWS_PFX_BASE64 secret is set. Without it, the
      # binary still ships but SmartScreen will warn "Unknown publisher".
      #
      # Expected secrets:
      #   WINDOWS_PFX_BASE64     - base64-encoded .pfx/.p12 cert
      #   WINDOWS_PFX_PASSWORD   - password protecting the .pfx
      # --------------------------------------------------------------------
      - name: Decode signing certificate
        id: signing
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
        run: |
          if (-not $env:PFX_BASE64) {
              Write-Host "WINDOWS_PFX_BASE64 not set — skipping code signing"
              "enabled=0" >> $env:GITHUB_OUTPUT
              exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))
          "pfx_path=$pfxPath"  >> $env:GITHUB_OUTPUT
          "enabled=1" >> $env:GITHUB_OUTPUT

      - name: Sign exe + DLLs
        if: steps.signing.outputs.enabled == '1'
        shell: pwsh
        env:
          PFX_PATH: ${{ steps.signing.outputs.pfx_path }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $release = "client/upstream/flutter/build/windows/x64/runner/Release"
          $targets = Get-ChildItem -Path $release -Recurse -Include *.exe,*.dll |
                     Where-Object { $_.Name -match "^(rustdesk|librustdesk)" }
          foreach ($f in $targets) {
              & signtool sign /f $env:PFX_PATH /p $env:PFX_PASSWORD `
                   /fd SHA256 /tr $env:SIGNTOOL_TIMESTAMP_URL /td SHA256 `
                   "$($f.FullName)"
              if ($LASTEXITCODE -ne 0) { throw "signtool failed on $($f.FullName)" }
          }

      # --------------------------------------------------------------------
      # Verify hardcoded values in the produced .exe and its DLLs.
      # --------------------------------------------------------------------
      - name: Verify hardcoded values
        shell: bash
        env:
          EXPECT_RENDEZVOUS: ${{ secrets.RENDEZVOUS_SERVER }}
          EXPECT_RELAY:      ${{ secrets.RENDEZVOUS_SERVER }}:21117
          EXPECT_API:        ${{ secrets.API_SERVER }}
          EXPECT_RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          release_dir="client/upstream/flutter/build/windows/x64/runner/Release"
          if [[ ! -d "$release_dir" ]]; then
              echo "::error::Flutter Windows release dir missing: $release_dir"
              find client/upstream/flutter/build -maxdepth 6 -type d -name Release | head
              exit 1
          fi
          echo "release dir: $release_dir"
          ls -la "$release_dir"
          # Scan only the Rust-compiled DLL. rustdesk.exe is a stripped
          # Flutter wrapper without the hardcoded strings.
          mapfile -t targets < <(find "$release_dir" -maxdepth 2 -type f \
              \( -iname "librustdesk*.dll" -o -iname "rustdesk*.dll" \) 2>/dev/null)
          if (( ${#targets[@]} == 0 )); then
              echo "::error::no librustdesk*.dll found in $release_dir"
              find "$release_dir" -maxdepth 2 -type f | head -30
              exit 1
          fi
          client/scripts/verify-hardcoded.sh "${targets[@]}"

      # --------------------------------------------------------------------
      # Package as portable zip.
      # --------------------------------------------------------------------
      - name: Package artefact
        shell: pwsh
        env:
          BRAND_APP_NAME: ${{ vars.BRAND_APP_NAME }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = if ($env:RELEASE_TAG) { $env:RELEASE_TAG } else { "${env:GITHUB_SHA}".Substring(0,7) }
          $out = "${env:BRAND_APP_NAME}-windows-x64-$tag.zip"
          Compress-Archive `
              -Path "client/upstream/flutter/build/windows/x64/runner/Release/*" `
              -DestinationPath "$out" `
              -CompressionLevel Optimal
          "ARTIFACT_PATH=$out" >> $env:GITHUB_ENV

      - name: Upload zip artefact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-zip
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 14
          if-no-files-found: error

      # --------------------------------------------------------------------
      # MSI installer (WiX via upstream's res/msi/ preprocess).
      # --------------------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build MSI
        working-directory: client/upstream/res/msi
        shell: pwsh
        run: |
          python preprocess.py --arp -d ../../flutter/build/windows/x64/runner/Release
          if ($LASTEXITCODE -ne 0) { throw "preprocess.py failed" }
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          if ($LASTEXITCODE -ne 0) { throw "msbuild failed" }

      - name: Sign MSI
        if: steps.signing.outputs.enabled == '1'
        shell: pwsh
        env:
          PFX_PATH:     ${{ steps.signing.outputs.pfx_path }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $msi = Get-ChildItem client/upstream/res/msi/Package/bin/x64/Release -Filter "*.msi" -Recurse | Select-Object -First 1
          & signtool sign /f $env:PFX_PATH /p $env:PFX_PASSWORD `
               /fd SHA256 /tr $env:SIGNTOOL_TIMESTAMP_URL /td SHA256 "$($msi.FullName)"
          if ($LASTEXITCODE -ne 0) { throw "signtool failed on MSI" }

      - name: Stage MSI artefact
        shell: pwsh
        env:
          BRAND_APP_NAME: ${{ vars.BRAND_APP_NAME }}
          RELEASE_TAG:    ${{ inputs.release_tag }}
        run: |
          $tag = if ($env:RELEASE_TAG) { $env:RELEASE_TAG } else { "${env:GITHUB_SHA}".Substring(0,7) }
          $msi = Get-ChildItem client/upstream/res/msi/Package/bin/x64/Release -Filter "*.msi" -Recurse | Select-Object -First 1
          $out = "${env:BRAND_APP_NAME}-windows-x64-$tag.msi"
          Copy-Item $msi.FullName $out
          "MSI_PATH=$out" >> $env:GITHUB_ENV

      - name: Upload MSI artefact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-msi
          path: ${{ env.MSI_PATH }}
          retention-days: 14
          if-no-files-found: error
