name: Release

# Triggered by any of:
#   - push to main (auto-version v0.0.<run_number> — CD mode)
#   - push of a v* tag (explicit release)
#   - workflow_dispatch (manual)
# Orchestrates the four per-platform build workflows, collects every
# artefact, computes checksums, publishes a GitHub Release, and refreshes
# the version feed on GitHub Pages so installed clients upgrade on the
# next poll.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to release (e.g. v0.1.0). Leave blank to use the current ref."
        required: false
        default: ""

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required by softprops/action-gh-release
  pages: write      # deploy-pages writes to the Pages environment
  id-token: write   # OIDC for deploy-pages

jobs:
  # --------------------------------------------------------------------------
  # Resolve the release tag once, so every downstream job filenames its
  # artefacts consistently.
  # --------------------------------------------------------------------------
  prepare:
    name: Prepare
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - id: resolve
        shell: bash
        env:
          DISPATCH_REF: ${{ inputs.ref }}
        run: |
          # Precedence:
          #   1. workflow_dispatch input (explicit branch/tag)
          #   2. git tag (refs/tags/v*) — explicit release
          #   3. main branch push — auto-versioned CD
          #   4. anything else — fallback to branch name
          if [[ -n "$DISPATCH_REF" ]]; then
              ref="$DISPATCH_REF"
              tag="$DISPATCH_REF"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
              ref="${GITHUB_REF}"
              tag="${GITHUB_REF#refs/tags/}"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
              ref="${GITHUB_REF}"
              tag="v0.0.${GITHUB_RUN_NUMBER}"
          else
              ref="${GITHUB_REF}"
              tag="${GITHUB_REF#refs/heads/}"
          fi
          # Sanitize: branch names contain '/' which is a directory separator.
          # Filenames downstream (RemoteControl-linux-$tag.tar.gz, etc.) would
          # explode into subpaths and the cp fails. Replace '/' with '-'.
          tag="${tag//\//-}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=$tag from ref=$ref"

  # --------------------------------------------------------------------------
  # Bridge generation — must run once before any platform build so that
  # bridge_generated.rs + generated_bridge.dart exist in the artefact store.
  # --------------------------------------------------------------------------
  bridge:
    name: Generate bridge
    needs: prepare
    uses: ./.github/workflows/generate-bridge.yml

  # --------------------------------------------------------------------------
  # Per-platform builds run in parallel.
  # --------------------------------------------------------------------------
  linux:
    name: Build Linux
    needs: [prepare, bridge]
    uses: ./.github/workflows/build-client-linux.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  windows:
    name: Build Windows
    needs: [prepare, bridge]
    uses: ./.github/workflows/build-client-windows.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  macos:
    name: Build macOS
    needs: [prepare, bridge]
    uses: ./.github/workflows/build-client-macos.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  android:
    name: Build Android
    needs: [prepare, bridge]
    uses: ./.github/workflows/build-client-android.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  # --------------------------------------------------------------------------
  # Gather all artefacts, checksum them, draft the release.
  # --------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: [prepare, bridge, linux, windows, macos, android]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout (for NOTICE / CHANGES in release body)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: ls -la dist/

      - name: Compute SHA256SUMS
        working-directory: dist
        run: |
          sha256sum -- * | tee SHA256SUMS.txt

      - name: Build release body
        id: body
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          {
            echo "## ${TAG}"
            echo
            echo "Self-hosted RustDesk client, built from the pinned upstream"
            echo "recorded in \`client/upstream/.upstream-ref\`."
            echo
            echo "### Downloads"
            echo
            echo "| Platform | File |"
            echo "|---|---|"
            for f in dist/*.zip dist/*.dmg dist/*.apk dist/*.tar.gz; do
                [[ -f "$f" ]] || continue
                name=$(basename "$f")
                case "$name" in
                    *windows*) plat="Windows (x64)";;
                    *macos*x86_64*) plat="macOS (Intel)";;
                    *macos*aarch64*) plat="macOS (Apple Silicon)";;
                    *linux*) plat="Linux (x64)";;
                    *android*arm64*) plat="Android (arm64)";;
                    *android*armeabi*) plat="Android (armv7)";;
                    *) plat="$name";;
                esac
                echo "| ${plat} | \`${name}\` |"
            done
            echo
            echo "### Verification"
            echo
            echo "Check \`SHA256SUMS.txt\` against the files above:"
            echo
            echo '```'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
            echo
            echo "### Upstream attribution"
            echo
            echo "Based on [RustDesk](https://github.com/rustdesk/rustdesk),"
            echo "Copyright (c) 2020 Purslane Ltd., licensed under AGPL-3.0."
            echo "Modifications are documented in"
            echo "[CHANGES.md](./CHANGES.md)."
          } > release_body.md
          echo "path=release_body.md" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          body_path: ${{ steps.body.outputs.path }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-rc') || contains(needs.prepare.outputs.tag, '-alpha') || contains(needs.prepare.outputs.tag, '-beta') }}
          fail_on_unmatched_files: true
          files: |
            dist/*.zip
            dist/*.msi
            dist/*.dmg
            dist/*.apk
            dist/*.tar.gz
            dist/SHA256SUMS.txt

  # --------------------------------------------------------------------------
  # Refresh the version feed on GitHub Pages. Installed clients POST to
  # https://<owner>.github.io/<repo>/version/latest.json once a day
  # (see client/upstream/libs/hbb_common/src/lib.rs, patched by
  # apply-branding.sh to point here instead of api.rustdesk.com).
  # The body format matches hbb_common::VersionCheckResponse.
  #
  # Requires Settings → Pages → Source: "GitHub Actions" (done once).
  # --------------------------------------------------------------------------
  deploy-version-feed:
    name: Deploy version feed (Pages)
    needs: [prepare, publish]
    runs-on: ubuntu-22.04
    # Skip on pre-releases so release candidates don't auto-upgrade
    # production clients. Tag skipping mirrors the `prerelease:` flag above.
    if: ${{ !contains(needs.prepare.outputs.tag, '-rc') && !contains(needs.prepare.outputs.tag, '-alpha') && !contains(needs.prepare.outputs.tag, '-beta') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generate version feed
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p _site/version
          cat > _site/version/latest.json <<EOF
          {"url":"https://github.com/${REPO}/releases/tag/${TAG}"}
          EOF
          # Also ship a human-readable index so hitting the Pages root
          # in a browser shows something useful rather than a 404.
          cat > _site/index.html <<EOF
          <!doctype html><meta charset="utf-8"><title>${REPO} — version feed</title>
          <h1>${REPO} — version feed</h1>
          <p>Installed clients poll <code>/version/latest.json</code> once a day.</p>
          <p>Current: <code>${TAG}</code> — see
          <a href="https://github.com/${REPO}/releases/tag/${TAG}">release notes</a>.</p>
          EOF
          cat _site/version/latest.json
      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
